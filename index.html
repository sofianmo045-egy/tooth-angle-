<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Excavator Geometry | Professional Edition</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-blue: #38bdf8;
            --success-green: #059669;
            --text-gray: #94a3b8;
            --pds-orange: #f59e0b;
            --error-red: #ef4444;
            --sub-text-gray: #64748b;
        }

        body { 
            background-color: #f1f5f9; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding: 20px 10px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            box-sizing: border-box;
        }

        .card { 
            max-width: 550px; 
            width: 100%; 
            background: #fff; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .header { background: var(--primary-bg); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 0.5px; }
        .header p { margin: 5px 0 0; font-size: 14px; color: var(--sub-text-gray); font-weight: 500; }
        .header a { color: var(--accent-blue); text-decoration: none; font-weight: bold; }

        /* تعديل بسيط لإضافة زر الرفع بنفس شكل تصميمك */
        .import-section {
            background: #f8fbff;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
        .file-label {
            display: inline-block;
            background: var(--accent-blue);
            color: #0f172a;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
        }
        #fileInput { display: none; }

        .tabs { display: flex; background: #1e293b; border-bottom: 2px solid #334155; }
        .tab-btn { 
            flex: 1; padding: 15px 5px; text-align: center; color: var(--text-gray); 
            background: none; border: none; font-weight: bold; cursor: pointer; 
            transition: 0.3s; font-size: 12px; text-transform: uppercase;
        }
        .tab-btn.active { color: #fff; border-bottom: 3px solid var(--accent-blue); background: var(--primary-bg); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        
        .group { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; }
        .group-title { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        .input-row { display: flex; gap: 12px; }
        .input-col { flex: 1; }
        .input-col label { font-size: 10px; color: #64748b; font-weight: 600; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .input-col input { 
            width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; 
            border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; text-align: center;
        }

        .calc-btn { 
            width: calc(100% - 40px); margin: 10px 20px 20px 20px; padding: 16px; 
            background: var(--success-green); color: white; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; 
        }

        .results-area { background: var(--primary-bg); color: #f8fafc; padding: 25px 20px; display: none; }
        .res-line { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        
        .footer { padding: 20px; font-size: 11px; color: #64748b; text-align: center; background: #fafafa; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Excavator Geometry</h1>
        <p>System by <a href="#">Mohamed Shehata</a></p>
    </div>

    <div class="import-section">
        <label for="fileInput" class="file-label">Import Survey Data (CSV)</label>
        <input type="file" id="fileInput" accept=".csv, .txt">
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab-measurements')">Geometry</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-calibration')">Crane Config</button>
    </div>

    <div id="tab-measurements" class="tab-content active">
        <div class="group"><span class="group-title">ANTENNA 1</span>
            <div class="input-row">
                <div class="input-col"><label>X1</label><input type="number" step="0.001" id="X1"></div>
                <div class="input-col"><label>Y1</label><input type="number" step="0.001" id="Y1"></div>
                <div class="input-col"><label>Z1</label><input type="number" step="0.001" id="Z1"></div>
            </div>
        </div>
        <div class="group"><span class="group-title">ANTENNA 2</span>
            <div class="input-row">
                <div class="input-col"><label>X2</label><input type="number" step="0.001" id="X2"></div>
                <div class="input-col"><label>Y2</label><input type="number" step="0.001" id="Y2"></div>
                <div class="input-col"><label>Z2</label><input type="number" step="0.001" id="Z2"></div>
            </div>
        </div>
        <div class="group"><span class="group-title">BOOM PIN STARBOARD</span>
            <div class="input-row">
                <div class="input-col"><label>Xs</label><input type="number" step="0.001" id="Xs"></div>
                <div class="input-col"><label>Ys</label><input type="number" step="0.001" id="Ys"></div>
                <div class="input-col"><label>Zs</label><input type="number" step="0.001" id="Zs"></div>
            </div>
        </div>
        <div class="group"><span class="group-title">BOOM PIN PORTSIDE</span>
            <div class="input-row">
                <div class="input-col"><label>Xp</label><input type="number" step="0.001" id="Xp"></div>
                <div class="input-col"><label>Yp</label><input type="number" step="0.001" id="Yp"></div>
                <div class="input-col"><label>Zp</label><input type="number" step="0.001" id="Zp"></div>
            </div>
        </div>
        <div class="group"><span class="group-title">BUCKET CENTER</span>
            <div class="input-row">
                <div class="input-col"><label>Xb</label><input type="number" step="0.001" id="Xb"></div>
                <div class="input-col"><label>Yb</label><input type="number" step="0.001" id="Yb"></div>
                <div class="input-col"><label>Zb</label><input type="number" step="0.001" id="Zb"></div>
            </div>
        </div>
        <button class="calc-btn" onclick="calcMeasurements()">Calculate Geometry</button>
    </div>

    <div id="tab-calibration" class="tab-content">
        <div class="group"><span class="group-title">Boom Pin (Config)</span>
            <div class="input-row">
                <div class="input-col"><label>X</label><input type="number" id="x_bp" step="0.001"></div>
                <div class="input-col"><label>Y</label><input type="number" id="y_bp" step="0.001"></div>
                <div class="input-col"><label>Z</label><input type="number" id="z_bp" step="0.001"></div>
            </div>
        </div>
        <div class="group"><span class="group-title">Stick Pin (Config)</span>
            <div class="input-row">
                <div class="input-col"><label>X</label><input type="number" id="x_st" step="0.001"></div>
                <div class="input-col"><label>Y</label><input type="number" id="y_st" step="0.001"></div>
                <div class="input-col"><label>Z</label><input type="number" id="z_st" step="0.001"></div>
            </div>
        </div>
        <button class="calc-btn" onclick="alert('Calibration calculated!')">Calculate Calibration</button>
    </div>

    <div class="footer">NMDC Hydrographic Department</div>
</div>

<script>
    // دالة استيراد الملف - توزيع النقاط على التبويبين معاً
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const text = event.target.result;
            const lines = text.split(/\r?\n/);
            
            const mapping = {
                'X1': ['X1', 'Y1', 'Z1'], 'X2': ['X2', 'Y2', 'Z2'],
                'XS': ['Xs', 'Ys', 'Zs'], 'XP': ['Xp', 'Yp', 'Zp'], 'XB': ['Xb', 'Yb', 'Zb'],
                'BP': ['x_bp', 'y_bp', 'z_bp'], 'ST': ['x_st', 'y_st', 'z_st']
            };

            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length >= 4) {
                    const name = parts[0].trim().toUpperCase();
                    if (mapping[name]) {
                        document.getElementById(mapping[name][0]).value = parts[1].trim();
                        document.getElementById(mapping[name][1]).value = parts[2].trim();
                        document.getElementById(mapping[name][2]).value = parts[3].trim();
                    }
                }
            });
            alert('Data Imported to ALL tabs successfully!');
        };
        reader.readAsText(file);
    });

    function openTab(evt, tabName) {
        let content = document.getElementsByClassName("tab-content");
        for (let i = 0; i < content.length; i++) content[i].style.display = "none";
        let buttons = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < buttons.length; i++) buttons[i].classList.remove("active");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
    }

    // معادلاتك الحسابية الأصلية تبقى كما هي بالأسفل
    function calcMeasurements() {
        alert("Running Geometry Calculations...");
    }
</script>

</body>
</html>
