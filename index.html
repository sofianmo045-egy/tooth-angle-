<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Excavator Geometry - Pro</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-blue: #38bdf8;
            --success-green: #059669;
            --text-gray: #94a3b8;
            --pds-orange: #f59e0b;
            --error-red: #ef4444;
            --sub-text-gray: #64748b;
        }

        body { 
            background-color: #f1f5f9; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding: 20px 10px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            box-sizing: border-box;
        }

        .card { 
            max-width: 600px; 
            width: 100%; 
            background: #fff; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .header { background: var(--primary-bg); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 0.5px; }
        .header p { margin: 5px 0 0; font-size: 14px; color: var(--sub-text-gray); font-weight: 500; }
        .header a { color: var(--accent-blue); text-decoration: none; font-weight: bold; }

        .import-container { background: #f8fbff; padding: 15px 20px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        .import-btn-label { display: inline-block; background: var(--accent-blue); color: #0f172a; padding: 10px 25px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .import-btn-label:hover { opacity: 0.8; }
        #csvFileInput { display: none; }

        .tabs { display: flex; background: #1e293b; border-bottom: 2px solid #334155; }
        .tab-btn { 
            flex: 1; padding: 15px 5px; text-align: center; color: var(--text-gray); 
            background: none; border: none; font-weight: bold; cursor: pointer; 
            transition: 0.3s; font-size: 11px; text-transform: uppercase;
        }
        .tab-btn.active { color: #fff; border-bottom: 3px solid var(--accent-blue); background: var(--primary-bg); }
        .tab-content { display: none; padding: 10px; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        .group { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; margin-bottom: 10px; border-radius: 10px; background: #fff; border: 1px solid #edf2f7; }
        .group-title { font-size: 11px; font-weight: 800; color: var(--primary-bg); text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .id-tag { color: var(--accent-blue); font-family: monospace; }
        
        .input-row { display: flex; gap: 10px; }
        .input-col { flex: 1; }
        .input-col label { font-size: 10px; color: #64748b; font-weight: 600; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .input-col input { 
            width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; 
            border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; text-align: center;
        }
        .input-col input:focus { border-color: var(--accent-blue); }

        .linked-box { background: #f0fff4; border: 1.5px solid #059669; }

        /* Instructions Table */
        .instr-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .instr-table th, .instr-table td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        .instr-table th { background: var(--primary-bg); color: white; }
        .instr-table tr:nth-child(even) { background: #f8fafc; }

        .calc-btn { 
            width: calc(100% - 40px); margin: 20px; padding: 16px; 
            background: var(--success-green); color: white; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; 
        }

        .action-btns-container { display: flex; gap: 8px; margin: 0 20px 20px; }
        .action-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        .clear-btn { background: #fee2e2; color: #ef4444; border: 1px solid #ef4444; }
        .reset-btn { background: #334155; color: white; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Excavator Geometry</h1>
        <p>12-Point Survey Mapping System</p>
        <div style="font-size: 12px; color: var(--text-gray); margin-top: 10px;">
            Created by: <a href="https://linkedin.com/in/mohamed-shehata-m045" target="_blank" style="color:var(--accent-blue)">Mohamed Shehata</a>
        </div>
    </div>

    <div class="import-container">
        <label for="csvFileInput" class="import-btn-label">📥 Import Survey CSV (12 Points)</label>
        <input type="file" id="csvFileInput" accept=".csv">
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab-inputs')">Survey Inputs</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-instructions')">Instructions</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-diagram')">Diagram</button>
    </div>

    <div id="tab-inputs" class="tab-content active">
        <div id="pointsContainer">
            </div>

        <button class="calc-btn" onclick="alert('Ready for Calculations!')">Process Geometry</button>
    </div>

    <div id="tab-instructions" class="tab-content">
        <div style="padding: 10px;">
            <h3 style="font-size: 16px; color: var(--primary-bg);">CSV Configuration Guide</h3>
            <p style="font-size: 13px; color: #64748b;">تأكد من ترتيب الـ IDs في ملف الـ CSV كما هو موضح بالجدول:</p>
            <table class="instr-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>ID (في الملف)</th>
                        <th>Description (وصف النقطة)</th>
                    </tr>
                </thead>
                <tbody id="instrBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="tab-diagram" class="tab-content">
        <div style="text-align: center; padding: 20px;">
             <img src="https://via.placeholder.com/400x300?text=Excavator+Points+Diagram" style="width: 100%; border-radius: 15px;">
        </div>
    </div>

    <div class="action-btns-container">
        <button class="action-btn clear-btn" onclick="clearFields()">Clear Page</button>
        <button class="action-btn reset-btn" onclick="resetAll()">Reset All</button>
    </div>
</div>

<script>
    // الترتيب والمسميات والـ IDs كما طلبت بالظبط
    const config = [
        { id: 'A1', name: 'ANTENNA 1' },
        { id: 'A2', name: 'ANTENNA 2' },
        { id: 'BS', name: 'BOOM STARBOARD', linked: true },
        { id: 'BP_SIDE', name: 'BOOM PORTSIDE' },
        { id: 'BC', name: 'BUCKET CENTER' },
        { id: 'BS_PIN', name: 'BOOM PIN', linked: true, source: 'BS' }, // الخانة 6 مرتبطة بـ BS
        { id: 'ST', name: 'STICK PIN' },
        { id: 'BP', name: 'BUCKET PIN' },
        { id: 'S3', name: 'S3 PIN' },
        { id: 'S4', name: 'S4 PIN' },
        { id: 'S5', name: 'S5 PIN' },
        { id: 'T1', name: 'T1 TEETH' }
    ];

    // توليد خانات الإدخال والجدول
    function initApp() {
        const container = document.getElementById('pointsContainer');
        const instrBody = document.getElementById('instrBody');
        
        config.forEach((point, index) => {
            // توليد الـ Grid
            const group = document.createElement('div');
            group.className = `group ${point.linked ? 'linked-box' : ''}`;
            group.innerHTML = `
                <span class="group-title">${point.name} <span class="id-tag">ID: ${point.source || point.id}</span></span>
                <div class="input-row">
                    <div class="input-col"><label>Easting (X)</label><input type="number" step="0.001" id="X_${point.id}" class="saveable"></div>
                    <div class="input-col"><label>Northing (Y)</label><input type="number" step="0.001" id="Y_${point.id}" class="saveable"></div>
                    <div class="input-col"><label>Elevation (Z)</label><input type="number" step="0.001" id="Z_${point.id}" class="saveable"></div>
                </div>
            `;
            container.appendChild(group);

            // توليد جدول التعليمات
            const row = `<tr><td>${index + 1}</td><td><strong>${point.source || point.id}</strong></td><td>${point.name}</td></tr>`;
            instrBody.innerHTML += row;
        });
        autoLoad();
    }

    // منطق التبويبات
    function openTab(evt, tabName) {
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // استيراد الملف مع ميزة ربط BS بـ الخانتين 3 و 6
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const lines = event.target.result.split(/\r?\n/);
            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length >= 4) {
                    const id = parts[0].trim().toUpperCase();
                    const eVal = parts[1].trim();
                    const nVal = parts[2].trim();
                    const zVal = parts[3].trim();

                    if (id === 'BS') {
                        // تحديث الخانة 3 والخانة 6 أوتوماتيكياً
                        fillPoint('BS', eVal, nVal, zVal);
                        fillPoint('BS_PIN', eVal, nVal, zVal);
                    } else {
                        // تحديث بقية الخانات بناءً على الـ ID
                        fillPoint(id, eVal, nVal, zVal);
                    }
                }
            });
            autoSave();
            alert('Data Processed Successfully!');
        };
        reader.readAsText(file);
    });

    function fillPoint(id, e, n, z) {
        const xField = document.getElementById(`X_${id}`);
        if (xField) {
            document.getElementById(`X_${id}`).value = e;
            document.getElementById(`Y_${id}`).value = n;
            document.getElementById(`Z_${id}`).value = z;
        }
    }

    // حفظ واسترجاع البيانات تلقائياً
    function autoSave() {
        const data = {};
        document.querySelectorAll('.saveable').forEach(input => {
            data[input.id] = input.value;
        });
        localStorage.setItem('excavator_survey_data', JSON.stringify(data));
    }

    function autoLoad() {
        const data = JSON.parse(localStorage.getItem('excavator_survey_data'));
        if (data) {
            for (let key in data) {
                const el = document.getElementById(key);
                if (el) el.value = data[key];
            }
        }
    }

    function clearFields() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        localStorage.removeItem('excavator_survey_data');
    }

    function resetAll() {
        if(confirm("هل تريد مسح السجل والإعدادات بالكامل؟")) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = initApp;
    document.addEventListener('input', (e) => { if(e.target.classList.contains('saveable')) autoSave(); });

</script>

</body>
</html>
