<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Excavator Tools">
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <title>Excavator Surveying Tools</title>
    <style>
        /* ... (نفس التنسيقات السابقة بدون تغيير) ... */
        :root {
            --primary-bg: #0f172a;
            --accent-blue: #38bdf8;
            --success-green: #059669;
            --text-gray: #94a3b8;
            --pds-orange: #f59e0b;
            --error-red: #ef4444;
        }

        body { 
            background-color: #f1f5f9; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding: 20px 10px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            box-sizing: border-box;
        }

        .card { 
            max-width: 550px; 
            width: 100%; 
            background: #fff; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .header { background: var(--primary-bg); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 20px; letter-spacing: 0.5px; }
        .header p { margin: 5px 0 0; font-size: 13px; color: var(--accent-blue); }
        .header a { color: var(--accent-blue); text-decoration: none; font-weight: bold; }
        .created-by { margin-top: 10px; font-size: 11px; color: #94a3b8; }

        .tabs { display: flex; background: #1e293b; border-bottom: 2px solid #334155; }
        .tab-btn { 
            flex: 1; padding: 12px 5px; text-align: center; color: var(--text-gray); 
            background: none; border: none; font-weight: bold; cursor: pointer; 
            transition: 0.3s; font-size: 12px; text-transform: uppercase;
        }
        .tab-btn.active { color: #fff; border-bottom: 3px solid var(--accent-blue); background: var(--primary-bg); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .diagram-container { width: 100%; background: #fff; padding: 20px 0; text-align: center; }
        .diagram-container img { max-width: 95%; height: auto; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .main-container { padding: 20px; }
        .group { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; }
        .group-title { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .main-title { font-size: 14px; font-weight: 800; color: #1e293b; text-transform: uppercase; margin-bottom: 25px; display: block; border-left: 4px solid var(--pds-orange); padding-left: 10px; }
        
        .input-block { margin-bottom: 20px; }
        .block-label { font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 8px; display: block; }

        .input-row { display: flex; gap: 12px; }
        .input-col { flex: 1; }
        .input-col label { font-size: 10px; color: #64748b; font-weight: 600; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .input-col input { 
            width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; 
            border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; text-align: center;
        }

        .calc-btn { 
            width: calc(100% - 40px); margin: 10px 20px 20px 20px; padding: 16px; 
            background: var(--success-green); color: white; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; 
        }

        .results-area { background: var(--primary-bg); color: #f8fafc; padding: 25px 20px; display: none; }
        .res-section-title { color: var(--pds-orange); font-size: 13px; font-weight: bold; border-bottom: 1px solid #334155; padding-bottom: 5px; margin: 15px 0 10px; }
        .res-line { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        .res-line b { color: #fff; }
        .offset-title { color: #10b981; font-size: 10px; font-weight: bold; text-transform: uppercase; margin: 20px 0 10px 0; padding-bottom: 5px; border-bottom: 1px dashed #334155; }

        .export-btn { width: 100%; padding: 14px; background: transparent; color: var(--accent-blue); border: 2px solid var(--accent-blue); border-radius: 10px; margin-top: 20px; cursor: pointer; font-weight: 800; }
        .report-btn { background: #64748b; color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%; margin-top: 20px; }

        .footer { padding: 25px; font-size: 11px; color: #64748b; text-align: center; background: #fafafa; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Excavator Tools</h1>
        <p>Surveying & Calibration Hub</p>
        <div class="created-by">Created by: <a href="https://linkedin.com/in/mohamed-shehata-m045" target="_blank">Mohamed Shehata</a></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab-measurements')">Measurements</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-calibration')">Calibration</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-diagram')">Diagram</button>
    </div>

    <div id="tab-measurements" class="tab-content active">
        <div class="group" style="background: #f8fbff; margin-top:10px;">
            <span class="group-title">ANTENNA 1</span>
            <div class="input-row">
                <div class="input-col"><label>X1</label><input type="number" step="0.001" id="X1" placeholder="-"></div>
                <div class="input-col"><label>Y1</label><input type="number" step="0.001" id="Y1" placeholder="-"></div>
                <div class="input-col"><label>Z1</label><input type="number" step="0.001" id="Z1" placeholder="-"></div>
            </div>
        </div>
        <button class="calc-btn" onclick="calcMeasurements()">Calculate Measurements</button>
        <div id="resultsMeasurements" class="results-area">
             </div>
    </div>

    </div>

<script>
    // ... (نفس السكريبت السابق) ...
</script>
</body>
</html>
