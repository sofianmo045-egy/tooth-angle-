<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Excavator Geometry</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-blue: #38bdf8;
            --success-green: #059669;
            --text-gray: #94a3b8;
            --pds-orange: #f59e0b;
            --error-red: #ef4444;
            --sub-text-gray: #64748b;
        }

        body { 
            background-color: #f1f5f9; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding: 20px 10px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            box-sizing: border-box;
        }

        .card { 
            max-width: 550px; 
            width: 100%; 
            background: #fff; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .header { background: var(--primary-bg); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 0.5px; }
        .header p { margin: 5px 0 0; font-size: 14px; color: var(--sub-text-gray); font-weight: 500; }
        .header a { color: var(--accent-blue); text-decoration: none; font-weight: bold; }

        .tabs { display: flex; background: #1e293b; border-bottom: 2px solid #334155; }
        .tab-btn { 
            flex: 1; padding: 15px 5px; text-align: center; color: var(--text-gray); 
            background: none; border: none; font-weight: bold; cursor: pointer; 
            transition: 0.3s; font-size: 12px; text-transform: uppercase;
        }
        .tab-btn.active { color: #fff; border-bottom: 3px solid var(--accent-blue); background: var(--primary-bg); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* تنسيق قسم الصور */
        .diagram-container { width: 100%; padding: 20px; box-sizing: border-box; background: #f8fafc; }
        .diagram-card { 
            background: #fff; 
            border-radius: 12px; 
            padding: 10px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .diagram-card h3 { 
            font-size: 14px; 
            color: #1e293b; 
            margin: 0 0 10px 0; 
            padding-bottom: 8px; 
            border-bottom: 1px solid #f1f5f9;
        }
        .diagram-card img { 
            width: 100%; 
            height: auto; 
            border-radius: 8px; 
            display: block;
        }
        
        .main-container { padding: 20px; }
        .group { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; }
        .group-title { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .input-row { display: flex; gap: 12px; }
        .input-col { flex: 1; }
        .input-col label { font-size: 10px; color: #64748b; font-weight: 600; display: block; margin-bottom: 4px; }
        .input-col input { 
            width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; 
            border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; text-align: center;
        }

        .calc-btn { 
            width: calc(100% - 40px); margin: 10px 20px 20px 20px; padding: 16px; 
            background: var(--success-green); color: white; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; 
        }

        .results-area { background: var(--primary-bg); color: #f8fafc; padding: 25px 20px; display: none; }
        .res-line { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        
        .action-btns-container { display: flex; gap: 8px; margin: 0 20px 20px; }
        .clear-btn { flex: 1; background: #fee2e2; color: #ef4444; border: 1px solid #ef4444; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 11px; }
        
        .footer { padding: 25px; font-size: 11px; color: #64748b; text-align: center; background: #fafafa; }
    </style>
</head>
<body onload="autoLoad()">

<div class="card">
    <div class="header">
        <h1>Excavator Geometry</h1>
        <p>Calculator and Calibration Assistant</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-measurements" onclick="openTab(event, 'tab-measurements')">Geometry</button>
        <button class="tab-btn" id="btn-calibration" onclick="openTab(event, 'tab-calibration')">Crane Config</button>
        <button class="tab-btn" id="btn-diagram" onclick="openTab(event, 'tab-diagram')">Diagram</button>
    </div>

    <div id="tab-measurements" class="tab-content active">
        <div style="padding: 15px 20px; background: #fff5f5; border-bottom: 1px solid #fee2e2;">
            <input type="file" id="csvFileInput" accept=".csv" style="display: none;" onchange="handleCSV(this)">
            <button onclick="document.getElementById('csvFileInput').click()" style="width:100%; padding:10px; background:#ef4444; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:13px;">
                📂 Import Survey CSV
            </button>
        </div>
        <div class="group">
            <span class="group-title">Antenna 1</span>
            <div class="input-row">
                <div class="input-col"><label>X1</label><input type="number" step="0.001" id="X1" class="saveable"></div>
                <div class="input-col"><label>Y1</label><input type="number" step="0.001" id="Y1" class="saveable"></div>
                <div class="input-col"><label>Z1</label><input type="number" step="0.001" id="Z1" class="saveable"></div>
            </div>
        </div>
        </div>

    <div id="tab-calibration" class="tab-content">
        <div class="main-container">
            <p style="text-align: center; color: #64748b;">مدخلات الحسابات موجودة هنا</p>
        </div>
    </div>

    <div id="tab-diagram" class="tab-content">
        <div class="diagram-container">
            
            <div class="diagram-card">
                <h3>1. CSV Import Guide</h3>
                <img src="CSV GUIDE .jpg" alt="CSV Guide">
            </div>

            <div class="diagram-card">
                <h3>2. Excavator Calibration Points</h3>
                <img src="excavator-diagram.jpg" alt="Excavator Diagram">
            </div>

            <div class="diagram-card">
                <h3>3. Stick Dimensions</h3>
                <img src="STICK DIM .png" alt="Stick Dimensions">
            </div>

            <div class="diagram-card">
                <h3>4. Bucket Dimensions</h3>
                <img src="BUCKET DIM.png" alt="Bucket Dimensions">
            </div>

        </div>
    </div>

    <div class="action-btns-container">
        <button class="clear-btn" onclick="clearPageOnly()">Clear Page</button>
    </div>

    <div class="footer">
        Mobile App Ready
    </div>
</div>

<script>
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
            tabcontent[i].className = tabcontent[i].className.replace(" active", "");
        }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "block";
        document.getElementById(tabName).className += " active";
        evt.currentTarget.className += " active";
    }

    // تأكد من بقاء بقية دوال الـ JavaScript الخاصة بالحسابات كما هي في ملفك الأصلي
    function autoLoad() {
        // تحميل البيانات المحفوظة إن وجدت
    }
</script>
</body>
</html>
