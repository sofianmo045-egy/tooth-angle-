<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EX. Measurements & PDS Tools</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-blue: #38bdf8;
            --success-green: #059669;
            --text-gray: #94a3b8;
            --pds-orange: #f59e0b;
        }

        body { background-color: #f1f5f9; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px; font-family: 'Segoe UI', sans-serif; margin: 0; box-sizing: border-box; }
        .card { max-width: 500px; width: 100%; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .header { background: var(--primary-bg); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 18px; }
        
        .group { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; }
        .group-title { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .pds-title { color: var(--pds-orange); border-left: 3px solid var(--pds-orange); padding-left: 8px; }
        
        .input-row { display: flex; gap: 12px; margin-bottom: 10px; }
        .input-col { flex: 1; }
        .input-col label { font-size: 10px; color: #64748b; font-weight: 600; display: block; margin-bottom: 4px; }
        .input-col input { width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box; }

        .calc-btn { width: calc(100% - 40px); margin: 20px; padding: 16px; background: var(--success-green); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }

        .results-area { background: var(--primary-bg); color: #f8fafc; padding: 25px 20px; display: none; }
        .res-line { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        .res-line b { color: #fff; }
        .pds-res { color: var(--pds-orange) !important; }

        .footer { padding: 25px; font-size: 11px; color: #64748b; text-align: center; background: #fafafa; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>EX. Measurements & PDS Geometry</h1>
        <p>Surveying & Calibration Tool</p>
    </div>

    <div class="group">
        <span class="group-title pds-title">PDS Stick S3 (Perpendicular Offset)</span>
        <div class="input-row">
            <div class="input-col"><label>Stick Pin X</label><input type="number" id="Xst" step="0.001" placeholder="0.000"></div>
            <div class="input-col"><label>Stick Pin Y</label><input type="number" id="Yst" step="0.001" placeholder="0.000"></div>
            <div class="input-col"><label>Stick Pin Z</label><input type="number" id="Zst" step="0.001" placeholder="0.000"></div>
        </div>
        <div class="input-row">
            <div class="input-col"><label>Bucket Pin X</label><input type="number" id="Xbs" step="0.001" placeholder="0.000"></div>
            <div class="input-col"><label>Bucket Pin Y</label><input type="number" id="Ybs" step="0.001" placeholder="0.000"></div>
            <div class="input-col"><label>Bucket Pin Z</label><input type="number" id="Zbs" step="0.001" placeholder="0.000"></div>
        </div>
        <div class="input-row" style="background: #fff9f0; padding: 10px; border-radius: 8px;">
            <div class="input-col"><label>S3 Pin Point X</label><input type="number" id="S3x" step="0.001" placeholder="0.000"></div>
            <div class="input-col"><label>S3 Pin Point Y</label><input type="number" id="S3y" step="0.001" placeholder="0.000"></div>
            <div class="input-col"><label>S3 Pin Point Z</label><input type="number" id="S3z" step="0.001" placeholder="0.000"></div>
        </div>
    </div>

    <div class="group">
        <span class="group-title pds-title">PDS Bucket T6 (Angle)</span>
        <div class="input-row">
            <div class="input-col"><label>T1 (Side 1)</label><input type="number" id="T1" step="0.001" placeholder="0.000"></div>
            <div class="input-col"><label>T5 (Side 2)</label><input type="number" id="T5" step="0.001" placeholder="0.000"></div>
            <div class="input-col"><label>T1S (Side 3)</label><input type="number" id="T1S" step="0.001" placeholder="0.000"></div>
        </div>
    </div>

    <button class="calc-btn" onclick="calculate()">Calculate All Results</button>

    <div id="resultsArea" class="results-area">
        <div style="color: var(--pds-orange); font-weight: bold; border-bottom: 1px solid #334155; padding-bottom: 5px;">PDS RESULTS</div>
        <div class="res-line"><span>Stick Length (S1):</span> <b id="out-S1">0.000 m</b></div>
        <div class="res-line"><span>Stick Offset (S3):</span> <b id="out-S3" class="pds-res">0.000 m</b></div>
        <div class="res-line"><span>Tooth Angle (T6):</span> <b id="out-T6" class="pds-res">0.000°</b></div>
    </div>

    <div class="footer">Created by Mohamed Shehata - NMDC</div>
</div>

<script>
    function calculate() {
        const getV = (id) => parseFloat(document.getElementById(id).value) || 0;

        // إحداثيات النقاط
        const A = { x: getV('Xst'), y: getV('Yst'), z: getV('Zst') }; // Stick Pin
        const B = { x: getV('Xbs'), y: getV('Ybs'), z: getV('Zbs') }; // Bucket Pin
        const P = { x: getV('S3x'), y: getV('S3y'), z: getV('S3z') }; // S3 Pin Point

        // 1. حساب طول الـ Stick (S1)
        const S1 = Math.sqrt(Math.pow(B.x - A.x, 2) + Math.pow(B.y - A.y, 2) + Math.pow(B.z - A.z, 2));

        // 2. حساب المسافة العمودية S3 (Point-to-Line Distance in 3D)
        // Equation: d = |(P-A) x (P-B)| / |B-A|
        let S3 = 0;
        if (S1 > 0) {
            const PA = { x: P.x - A.x, y: P.y - A.y, z: P.z - A.z };
            const PB = { x: P.x - B.x, y: P.y - B.y, z: P.z - B.z };
            const AB = { x: B.x - A.x, y: B.y - A.y, z: B.z - A.z };

            // Cross Product (PA x PB)
            const CP = {
                x: PA.y * PB.z - PA.z * PB.y,
                y: PA.z * PB.x - PA.x * PB.z,
                z: PA.x * PB.y - PA.y * PB.x
            };

            const CP_Mag = Math.sqrt(Math.pow(CP.x, 2) + Math.pow(CP.y, 2) + Math.pow(CP.z, 2));
            S3 = CP_Mag / S1;
        }

        // 3. حساب T6 (Bucket Angle)
        const T1 = getV('T1'), T5 = getV('T5'), T1S = getV('T1S');
        let T6 = 0;
        if (T1 > 0 && T5 > 0 && T1S > 0) {
            const cosT6 = (Math.pow(T1, 2) + Math.pow(T5, 2) - Math.pow(T1S, 2)) / (2 * T1 * T5);
            if (cosT6 >= -1 && cosT6 <= 1) T6 = Math.acos(cosT6) * (180 / Math.PI);
        }

        // عرض النتائج
        document.getElementById('out-S1').innerText = S1.toFixed(3) + " m";
        document.getElementById('out-S3').innerText = S3.toFixed(3) + " m";
        document.getElementById('out-T6').innerText = T6.toFixed(3) + "°";
        document.getElementById('resultsArea').style.display = "block";
    }
</script>
</body>
</html>
