<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excavator Calculator - Dynamic Mapping</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: var(--primary); }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--secondary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .upload-section { border: 2px dashed var(--accent); padding: 20px; text-align: center; margin-bottom: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: var(--primary); color: white; }
        
        select { padding: 5px; border-radius: 4px; border: 1px solid var(--accent); cursor: pointer; font-weight: bold; }
        .result-box { margin-top: 20px; background: #e8f4fd; padding: 15px; border-right: 5px solid var(--accent); border-radius: 4px; }
        .status-ok { color: #27ae60; font-weight: bold; }
        .status-error { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>أداة معالجة إحداثيات الحفار (Manual ID Mapping)</h2>
    
    <div class="upload-section">
        <label for="csvFile">اختر ملف CSV (E, N, Z, Code): </label>
        <input type="presentation" type="file" id="csvFile" accept=".csv">
    </div>

    <div id="tableContainer" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>الرقم</th>
                    <th>الإحداثي (E)</th>
                    <th>الإحداثي (N)</th>
                    <th>المنسوب (Z)</th>
                    <th>تحديد النوع (ID)</th>
                </tr>
            </thead>
            <tbody id="csvTableBody"></tbody>
        </table>
    </div>

    <div id="calculationsResult" class="result-box" style="display:none;">
        <h3>نتائج الحسابات:</h3>
        <div id="finalOutput"></div>
    </div>
</div>

<script>
    const csvFileInput = document.getElementById('csvFile');
    const tableContainer = document.getElementById('tableContainer');
    const tableBody = document.getElementById('csvTableBody');
    const resultBox = document.getElementById('calculationsResult');
    const finalOutput = document.getElementById('finalOutput');

    // الخيارات المتاحة للأكواد (بناءً على طلبك السابق)
    const availableIDs = [
        { value: 'BS', label: 'Boom Pin (BS)' },
        { value: 'T5', label: 'T5 / Bucket Pin' },
        { value: 'Stick', label: 'Stick Pin' },
        { value: 'Other', label: 'Other' }
    ];

    let rawData = []; // لتخزين البيانات المستخرجة من الملف

    csvFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = function(event) {
            const text = event.target.result;
            processCSV(text);
        };
        reader.readAsText(file);
    });

    function processCSV(text) {
        const lines = text.split('\n');
        rawData = [];
        tableBody.innerHTML = '';

        lines.forEach((line, index) => {
            if (line.trim() === '') return;
            const cols = line.split(',');
            if (cols.length >= 4) {
                const row = {
                    e: cols[0].trim(),
                    n: cols[1].trim(),
                    z: cols[2].trim(),
                    code: cols[3].trim().toUpperCase()
                };
                rawData.push(row);
                renderRow(row, index);
            }
        });

        tableContainer.style.display = 'block';
        runCalculations(); // تشغيل الحسابات الأولية
    }

    function renderRow(row, index) {
        const tr = document.createElement('tr');
        
        // التحقق من الكود القادم من الملف لمطابقته مع الخيارات
        let detectedID = 'Other';
        if (row.code.includes('BS')) detectedID = 'BS';
        else if (row.code.includes('T5') || row.code.includes('BUCKET')) detectedID = 'T5';
        else if (row.code.includes('STICK')) detectedID = 'Stick';

        tr.innerHTML = `
            <td>${index + 1}</td>
            <td>${row.e}</td>
            <td>${row.n}</td>
            <td>${row.z}</td>
            <td>
                <select onchange="updateMapping(${index}, this.value)">
                    ${availableIDs.map(id => `
                        <option value="${id.value}" ${id.value === detectedID ? 'selected' : ''}>
                            ${id.label}
                        </option>
                    `).join('')}
                </select>
            </td>
        `;
        tableBody.appendChild(tr);
        // تحديث الكود في الـ memory بناءً على الاكتشاف التلقائي
        rawData[index].mappedID = detectedID;
    }

    function updateMapping(index, newValue) {
        rawData[index].mappedID = newValue;
        runCalculations(); // إعادة الحساب فور تغيير أي اختيار
    }

    function runCalculations() {
        // استخراج النقاط بناءً على الـ Mapping الحالي
        const bsPoint = rawData.find(r => r.mappedID === 'BS');
        const t5Point = rawData.find(r => r.mappedID === 'T5');

        resultBox.style.display = 'block';
        
        if (bsPoint && t5Point) {
            // معادلة تجريبية (يمكنك وضع معادلاتك الدقيقة هنا)
            const dx = t5Point.e - bsPoint.e;
            const dy = t5Point.n - bsPoint.n;
            const horizontalDist = Math.sqrt(dx*dx + dy*dy).toFixed(3);
            const verticalDist = (t5Point.z - bsPoint.z).toFixed(3);

            finalOutput.innerHTML = `
                <p class="status-ok">✔ تم الربط بنجاح</p>
                <p>نقطة الـ <b>BS</b> المستخدمة: (E: ${bsPoint.e}, N: ${bsPoint.n}, Z: ${bsPoint.z})</p>
                <p>نقطة الـ <b>T5</b> المستخدمة: (E: ${t5Point.e}, N: ${t5Point.n}, Z: ${t5Point.z})</p>
                <hr>
                <p>المسافة الأفقية المحسوبة: <b>${horizontalDist} متر</b></p>
                <p>فرق المنسوب: <b>${verticalDist} متر</b></p>
            `;
        } else {
            finalOutput.innerHTML = `
                <p class="status-error">⚠ تنبيه: لم يتم تحديد جميع النقاط المطلوبة (BS و T5).</p>
                <p>يرجى اختيار الـ ID الصحيح من القوائم أعلاه ليتم الحساب.</p>
            `;
        }
    }
</script>

</body>
</html>
