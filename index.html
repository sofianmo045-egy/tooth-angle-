<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Excavator Geometry Pro</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-blue: #38bdf8;
            --success-green: #059669;
            --text-gray: #94a3b8;
            --pds-orange: #f59e0b;
            --error-red: #ef4444;
            --sub-text-gray: #64748b;
        }

        body { 
            background-color: #f1f5f9; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding: 20px 10px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            box-sizing: border-box;
        }

        .card { 
            max-width: 550px; 
            width: 100%; 
            background: #fff; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .header { background: var(--primary-bg); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 0.5px; }
        .header p { margin: 5px 0 0; font-size: 14px; color: var(--sub-text-gray); font-weight: 500; }
        .header a { color: var(--accent-blue); text-decoration: none; font-weight: bold; }

        .tabs { display: flex; background: #1e293b; border-bottom: 2px solid #334155; }
        .tab-btn { 
            flex: 1; padding: 15px 5px; text-align: center; color: var(--text-gray); 
            background: none; border: none; font-weight: bold; cursor: pointer; 
            transition: 0.3s; font-size: 12px; text-transform: uppercase;
        }
        .tab-btn.active { color: #fff; border-bottom: 3px solid var(--accent-blue); background: var(--primary-bg); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .main-container { padding: 20px; }
        .group { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; }
        .group-title { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        .input-block { margin-bottom: 20px; }
        .block-label { font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 8px; display: block; }

        .input-row { display: flex; gap: 12px; }
        .input-col { flex: 1; }
        .input-col label { font-size: 10px; color: #64748b; font-weight: 600; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .input-col input { 
            width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; 
            border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; text-align: center;
        }

        .calc-btn { 
            width: calc(100% - 40px); margin: 10px 20px 20px 20px; padding: 16px; 
            background: var(--success-green); color: white; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; 
        }

        .results-area { background: var(--primary-bg); color: #f8fafc; padding: 25px 20px; display: none; }
        .res-line { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        .res-line b { color: #fff; }
        
        .history-btn { background: #334155; color: white; border: none; padding: 10px; border-radius: 8px; width: calc(100% - 40px); margin: 0 20px 10px; cursor: pointer; font-size: 12px; }
        .clear-btn { background: #fee2e2; color: #ef4444; border: 1px solid #ef4444; padding: 10px; border-radius: 10px; width: calc(100% - 40px); margin: 0 20px 20px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* History Modal */
        #historyModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow: auto; }
        .modal-content { background: #fff; margin: 10% auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 500px; }
        .history-item { border-bottom: 1px solid #ddd; padding: 10px 0; font-size: 12px; color: #334155; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Excavator Geometry</h1>
        <p>Created by: <a href="https://linkedin.com/in/mohamed-shehata-m045" target="_blank">Mohamed Shehata</a></p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-measurements" onclick="openTab(event, 'tab-measurements')">Geometry</button>
        <button class="tab-btn" id="btn-calibration" onclick="openTab(event, 'tab-calibration')">Crane Config</button>
    </div>

    <div id="tab-measurements" class="tab-content active">
        <div class="group" style="background: #f8fbff; margin-top:10px;">
            <span class="group-title">ANTENNA 1</span>
            <div class="input-row">
                <div class="input-col"><label>X1</label><input type="number" step="0.001" id="X1" class="saveable" placeholder="-"></div>
                <div class="input-col"><label>Y1</label><input type="number" step="0.001" id="Y1" class="saveable" placeholder="-"></div>
                <div class="input-col"><label>Z1</label><input type="number" step="0.001" id="Z1" class="saveable" placeholder="-"></div>
            </div>
        </div>
        <div class="group" style="background: #f8fbff;">
            <span class="group-title">ANTENNA 2</span>
            <div class="input-row">
                <div class="input-col"><label>X2</label><input type="number" step="0.001" id="X2" class="saveable" placeholder="-"></div>
                <div class="input-col"><label>Y2</label><input type="number" step="0.001" id="Y2" class="saveable" placeholder="-"></div>
                <div class="input-col"><label>Z2</label><input type="number" step="0.001" id="Z2" class="saveable" placeholder="-"></div>
            </div>
        </div>
        <div class="group">
            <span class="group-title">BOOM PIN STBD</span>
            <div class="input-row">
                <div class="input-col"><label>Xs</label><input type="number" id="Xs" class="saveable"></div>
                <div class="input-col"><label>Ys</label><input type="number" id="Ys" class="saveable"></div>
                <div class="input-col"><label>Zs</label><input type="number" id="Zs" class="saveable"></div>
            </div>
        </div>
        <div class="group">
            <span class="group-title">BOOM PIN PORT</span>
            <div class="input-row">
                <div class="input-col"><label>Xp</label><input type="number" id="Xp" class="saveable"></div>
                <div class="input-col"><label>Yp</label><input type="number" id="Yp" class="saveable"></div>
                <div class="input-col"><label>Zp</label><input type="number" id="Zp" class="saveable"></div>
            </div>
        </div>
        <div class="group">
            <span class="group-title">BUCKET CENTER</span>
            <div class="input-row">
                <div class="input-col"><label>Xb</label><input type="number" id="Xb" class="saveable"></div>
                <div class="input-col"><label>Yb</label><input type="number" id="Yb" class="saveable"></div>
                <div class="input-col"><label>Zb</label><input type="number" id="Zb" class="saveable"></div>
            </div>
        </div>
        <button class="calc-btn" onclick="calcMeasurements()">Calculate Geometry</button>
        <div id="resultsMeasurements" class="results-area">
            <div class="res-line"><span>Machine Heading:</span> <b id="out-mH">-</b></div>
            <div class="res-line"><span>Antenna H-Distance:</span> <b id="out-antDist">-</b></div>
        </div>
    </div>

    <div id="tab-calibration" class="tab-content">
        <div class="main-container">
            <div class="input-block"><span class="block-label">Boom Pin (Reference)</span><div class="input-row">
                <div class="input-col"><label>X</label><input type="number" id="x_bp" class="saveable"></div>
                <div class="input-col"><label>Y</label><input type="number" id="y_bp" class="saveable"></div>
                <div class="input-col"><label>Z</label><input type="number" id="z_bp" class="saveable"></div>
            </div></div>
            <div class="input-block"><span class="block-label">Stick Pin</span><div class="input-row">
                <div class="input-col"><label>X</label><input type="number" id="x_st" class="saveable"></div>
                <div class="input-col"><label>Y</label><input type="number" id="y_st" class="saveable"></div>
                <div class="input-col"><label>Z</label><input type="number" id="z_st" class="saveable"></div>
            </div></div>
            <div class="input-block"><span class="block-label">Bucket Pin</span><div class="input-row">
                <div class="input-col"><label>X</label><input type="number" id="x_bu" class="saveable"></div>
                <div class="input-col"><label>Y</label><input type="number" id="y_bu" class="saveable"></div>
                <div class="input-col"><label>Z</label><input type="number" id="z_bu" class="saveable"></div>
            </div></div>
            <div class="input-block"><span class="block-label">S3 Pin</span><div class="input-row">
                <div class="input-col"><label>X</label><input type="number" id="x_s3" class="saveable"></div>
                <div class="input-col"><label>Y</label><input type="number" id="y_s3" class="saveable"></div>
                <div class="input-col"><label>Z</label><input type="number" id="z_s3" class="saveable"></div>
            </div></div>
        </div>
        <button class="calc-btn" onclick="calcCalibration()">Calculate Crane Config</button>
        <div id="resultsCalibration" class="results-area">
            <div class="res-line" style="color:var(--accent-blue)"><span>Boom Stick V (ΔZ):</span> <b id="out-bsv">-</b></div>
            <div class="res-line"><span>Boom Length:</span> <b id="out-boomL_cal">-</b></div>
            <div class="res-line"><span>Stick Length:</span> <b id="out-stickL_cal">-</b></div>
            <div class="res-line"><span>S2:</span> <b id="out-s2">-</b></div>
            <div class="res-line"><span>S3:</span> <b id="out-s3">-</b></div>
        </div>
    </div>

    <button class="history-btn" onclick="toggleHistory()">Show History Log</button>
    <button class="clear-btn" onclick="resetAllData()">Reset All Memory</button>
</div>

<div id="historyModal">
    <div class="modal-content">
        <h2 style="font-size:16px; border-bottom:2px solid var(--primary-bg)">Calculation History</h2>
        <div id="historyList"></div>
        <button class="calc-btn" onclick="toggleHistory()" style="background:var(--error-red); margin:10px 0 0">Close</button>
    </div>
</div>

<script>
    const getV = (id) => { const el = document.getElementById(id); return el && el.value !== "" ? parseFloat(el.value) : null; };
    const format = (v) => v === null || isNaN(v) ? "---" : v.toFixed(3);

    function openTab(evt, tabName) {
        document.querySelectorAll(".tab-content").forEach(t => t.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
        localStorage.setItem('active_tab', tabName);
    }

    function addToHistory(type, results) {
        let history = JSON.parse(localStorage.getItem('calc_history') || "[]");
        const entry = { time: new Date().toLocaleString(), type, results };
        history.unshift(entry);
        localStorage.setItem('calc_history', JSON.stringify(history.slice(0, 10)));
    }

    function toggleHistory() {
        const modal = document.getElementById('historyModal');
        const list = document.getElementById('historyList');
        if (modal.style.display === "block") {
            modal.style.display = "none";
        } else {
            const history = JSON.parse(localStorage.getItem('calc_history') || "[]");
            list.innerHTML = history.length ? "" : "No history found.";
            history.forEach(item => {
                list.innerHTML += `<div class="history-item"><b>[${item.time}] ${item.type}</b><br>${item.results}</div>`;
            });
            modal.style.display = "block";
        }
    }

    function calcMeasurements() {
        const X1=getV('X1'), Y1=getV('Y1'), X2=getV('X2'), Y2=getV('Y2'), Xs=getV('Xs'), Xp=getV('Xp');
        const antDist = (X1!==null && X2!==null) ? Math.sqrt((X2-X1)**2 + (Y2-Y1)**2) : null;
        
        document.getElementById('out-antDist').innerText = format(antDist) + " m";
        document.getElementById('resultsMeasurements').style.display = "block";
        localStorage.setItem('res_out-antDist', format(antDist));
        addToHistory("Geometry", `Antenna Dist: ${format(antDist)}m`);
    }

    function calcCalibration() {
        const zbp=getV('z_bp'), zst=getV('z_st'), xbp=getV('x_bp'), ybp=getV('y_bp'), xst=getV('x_st'), yst=getV('y_st'), zbp_v=getV('z_bp');
        
        const bsv = (zbp!==null && zst!==null) ? zbp - zst : null;
        const bl = (xbp!==null && xst!==null) ? Math.sqrt((xbp-xst)**2 + (ybp-yst)**2 + (zbp-zst)**2) : null;

        document.getElementById('out-bsv').innerText = format(bsv) + " m";
        document.getElementById('out-boomL_cal').innerText = format(bl) + " m";
        document.getElementById('resultsCalibration').style.display = "block";
        
        localStorage.setItem('res_out-bsv', format(bsv));
        localStorage.setItem('res_out-boomL_cal', format(bl));
        addToHistory("Crane Config", `BSV: ${format(bsv)}m, BoomL: ${format(bl)}m`);
    }

    function autoSave() {
        const data = {};
        document.querySelectorAll('.saveable').forEach(el => data[el.id] = el.value);
        localStorage.setItem('excavator_data', JSON.stringify(data));
    }

    function autoLoad() {
        const data = JSON.parse(localStorage.getItem('excavator_data') || "{}");
        for (let id in data) if (document.getElementById(id)) document.getElementById(id).value = data[id];
        
        ['out-bsv','out-boomL_cal','out-antDist'].forEach(id => {
            const val = localStorage.getItem('res_'+id);
            if (val && document.getElementById(id)) {
                document.getElementById(id).innerText = val;
                document.getElementById(id).parentElement.parentElement.style.display = "block";
            }
        });
        const tab = localStorage.getItem('active_tab');
        if (tab) document.getElementById(tab==='tab-measurements'?'btn-measurements':'btn-calibration').click();
    }

    function resetAllData() { if(confirm("Clear all?")) { localStorage.clear(); location.reload(); } }

    document.querySelectorAll('.saveable').forEach(el => el.addEventListener('input', autoSave));
    window.onload = autoLoad;
</script>
</body>
</html>
